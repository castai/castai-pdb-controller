apiVersion: v1
kind: Namespace
metadata:
  name: e2e-test
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: basic-app
  namespace: e2e-test
  labels:
    app: basic-app
spec:
  replicas: 3
  selector:
    matchLabels:
      app: basic-app
  template:
    metadata:
      labels:
        app: basic-app
    spec:
      containers:
      - name: nginx
        image: nginx:alpine
        ports:
        - containerPort: 80
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: custom-min-available
  namespace: e2e-test
  labels:
    app: custom-min-available
  annotations:
    workloads.cast.ai/pdb-minAvailable: "2"
spec:
  replicas: 4
  selector:
    matchLabels:
      app: custom-min-available
  template:
    metadata:
      labels:
        app: custom-min-available
    spec:
      containers:
      - name: nginx
        image: nginx:alpine
        ports:
        - containerPort: 80
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: custom-max-unavailable
  namespace: e2e-test
  labels:
    app: custom-max-unavailable
  annotations:
    workloads.cast.ai/pdb-maxUnavailable: "1"
spec:
  replicas: 5
  selector:
    matchLabels:
      app: custom-max-unavailable
  template:
    metadata:
      labels:
        app: custom-max-unavailable
    spec:
      containers:
      - name: nginx
        image: nginx:alpine
        ports:
        - containerPort: 80
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: bypass-pdb
  namespace: e2e-test
  labels:
    app: bypass-pdb
  annotations:
    workloads.cast.ai/bypass-default-pdb: "true"
spec:
  replicas: 3
  selector:
    matchLabels:
      app: bypass-pdb
  template:
    metadata:
      labels:
        app: bypass-pdb
    spec:
      containers:
      - name: nginx
        image: nginx:alpine
        ports:
        - containerPort: 80
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: stateful-app
  namespace: e2e-test
  labels:
    app: stateful-app
spec:
  replicas: 3
  selector:
    matchLabels:
      app: stateful-app
  template:
    metadata:
      labels:
        app: stateful-app
    spec:
      containers:
      - name: nginx
        image: nginx:alpine
        ports:
        - containerPort: 80
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: single-replica
  namespace: e2e-test
  labels:
    app: single-replica
spec:
  replicas: 1
  selector:
    matchLabels:
      app: single-replica
  template:
    metadata:
      labels:
        app: single-replica
    spec:
      containers:
      - name: nginx
        image: nginx:alpine
        ports:
        - containerPort: 80
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: excluded-workload
  namespace: e2e-test
  labels:
    app: excluded-workload
    monitoring: "true"
spec:
  replicas: 3
  selector:
    matchLabels:
      app: excluded-workload
  template:
    metadata:
      labels:
        app: excluded-workload
        monitoring: "true"
    spec:
      containers:
      - name: nginx
        image: nginx:alpine
        ports:
        - containerPort: 80
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: existing-pdb-test
  namespace: e2e-test
  labels:
    app: existing-pdb-test
spec:
  replicas: 3
  selector:
    matchLabels:
      app: existing-pdb-test
  template:
    metadata:
      labels:
        app: existing-pdb-test
    spec:
      containers:
      - name: nginx
        image: nginx:alpine
        ports:
        - containerPort: 80
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: existing-pdb
  namespace: e2e-test
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: existing-pdb-test

