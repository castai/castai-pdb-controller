---
# Simple test workload for PDB Controller functionality
apiVersion: v1
kind: Namespace
metadata:
  name: simple-test
---
# Test 1: Basic deployment that should get default PDB
apiVersion: apps/v1
kind: Deployment
metadata:
  name: simple-app
  namespace: simple-test
  labels:
    app: simple-app
spec:
  replicas: 3
  selector:
    matchLabels:
      app: simple-app
  template:
    metadata:
      labels:
        app: simple-app
    spec:
      containers:
      - name: nginx
        image: nginx:alpine
        ports:
        - containerPort: 80
---
# Test 2: Deployment with custom minAvailable annotation
apiVersion: apps/v1
kind: Deployment
metadata:
  name: custom-app
  namespace: simple-test
  annotations:
    workloads.cast.ai/pdb-minAvailable: "2"
  labels:
    app: custom-app
spec:
  replicas: 4
  selector:
    matchLabels:
      app: custom-app
  template:
    metadata:
      labels:
        app: custom-app
    spec:
      containers:
      - name: nginx
        image: nginx:alpine
        ports:
        - containerPort: 80
---
# Test 3: StatefulSet
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: simple-statefulset
  namespace: simple-test
  labels:
    app: simple-statefulset
spec:
  serviceName: simple-statefulset
  replicas: 2
  selector:
    matchLabels:
      app: simple-statefulset
  template:
    metadata:
      labels:
        app: simple-statefulset
    spec:
      containers:
      - name: nginx
        image: nginx:alpine
        ports:
        - containerPort: 80

