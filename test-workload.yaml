---
# Test workload for PDB Controller functionality
# This file tests: exclusions, annotations, minAvailable, maxUnavailable, and poor PDB detection

apiVersion: v1
kind: Namespace
metadata:
  name: pdb-test
---
# Test 1: Basic deployment that should get default PDB (minAvailable: "1")
apiVersion: apps/v1
kind: Deployment
metadata:
  name: basic-app
  namespace: pdb-test
  labels:
    app: basic-app
    env: test
spec:
  replicas: 3
  selector:
    matchLabels:
      app: basic-app
  template:
    metadata:
      labels:
        app: basic-app
    spec:
      containers:
      - name: nginx
        image: nginx:alpine
        ports:
        - containerPort: 80
---
# Test 2: Deployment with custom PDB annotations (should override defaults)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: custom-pdb-app
  namespace: pdb-test
  annotations:
    workloads.cast.ai/pdb-minAvailable: "2"
  labels:
    app: custom-pdb-app
    env: test
spec:
  replicas: 5
  selector:
    matchLabels:
      app: custom-pdb-app
  template:
    metadata:
      labels:
        app: custom-pdb-app
    spec:
      containers:
      - name: nginx
        image: nginx:alpine
        ports:
        - containerPort: 80
---
# Test 3: Deployment with maxUnavailable annotation
apiVersion: apps/v1
kind: Deployment
metadata:
  name: max-unavailable-app
  namespace: pdb-test
  annotations:
    workloads.cast.ai/pdb-maxUnavailable: "1"
  labels:
    app: max-unavailable-app
    env: test
spec:
  replicas: 4
  selector:
    matchLabels:
      app: max-unavailable-app
  template:
    metadata:
      labels:
        app: max-unavailable-app
    spec:
      containers:
      - name: nginx
        image: nginx:alpine
        ports:
        - containerPort: 80
---
# Test 4: Deployment that should be excluded (matches exclusion rule)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: db-temp-app
  namespace: pdb-test
  labels:
    app: db-temp-app
    type: "db-backup"
    env: "staging"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: db-temp-app
  template:
    metadata:
      labels:
        app: db-temp-app
        type: "db-backup"
        env: "staging"
    spec:
      containers:
      - name: nginx
        image: nginx:alpine
        ports:
        - containerPort: 80
---
# Test 5: Deployment with bypass annotation (should not get PDB)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: bypass-app
  namespace: pdb-test
  annotations:
    workloads.cast.ai/bypass-default-pdb: "true"
  labels:
    app: bypass-app
    env: test
spec:
  replicas: 2
  selector:
    matchLabels:
      app: bypass-app
  template:
    metadata:
      labels:
        app: bypass-app
    spec:
      containers:
      - name: nginx
        image: nginx:alpine
        ports:
        - containerPort: 80
---
# Test 6: StatefulSet to test StatefulSet handling
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: test-statefulset
  namespace: pdb-test
  labels:
    app: test-statefulset
    env: test
spec:
  serviceName: test-statefulset
  replicas: 3
  selector:
    matchLabels:
      app: test-statefulset
  template:
    metadata:
      labels:
        app: test-statefulset
    spec:
      containers:
      - name: nginx
        image: nginx:alpine
        ports:
        - containerPort: 80
---
# Test 7: Deployment with poor PDB configuration (minAvailable > replicas)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: poor-pdb-app
  namespace: pdb-test
  annotations:
    workloads.cast.ai/pdb-minAvailable: "5"
  labels:
    app: poor-pdb-app
    env: test
spec:
  replicas: 3
  selector:
    matchLabels:
      app: poor-pdb-app
  template:
    metadata:
      labels:
        app: poor-pdb-app
    spec:
      containers:
      - name: nginx
        image: nginx:alpine
        ports:
        - containerPort: 80
---
# Test 8: Deployment in kube-system namespace (should be excluded)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: test-kube-system
  namespace: kube-system
  labels:
    app: test-kube-system
spec:
  replicas: 2
  selector:
    matchLabels:
      app: test-kube-system
  template:
    metadata:
      labels:
        app: test-kube-system
    spec:
      containers:
      - name: nginx
        image: nginx:alpine
        ports:
        - containerPort: 80
